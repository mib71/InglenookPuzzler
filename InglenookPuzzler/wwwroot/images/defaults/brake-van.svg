<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 120">
  <!-- Chassis -->
  <rect x="10" y="88" width="140" height="7" rx="1" fill="#2a2a2a"/>
  <!-- Main body -->
  <rect x="18" y="32" width="100" height="56" rx="2" fill="#6a3a2a" stroke="#4a2a1a" stroke-width="2"/>
  <!-- Roof -->
  <rect x="16" y="26" width="104" height="10" rx="2" fill="#4a2a1a" stroke="#3a1a0a" stroke-width="1.5"/>
  <!-- Veranda -->
  <rect x="118" y="42" width="26" height="46" rx="1" fill="#5a3a2a" stroke="#4a2a1a" stroke-width="1.5"/>
  <line x1="131" y1="42" x2="131" y2="88" stroke="#4a2a1a" stroke-width="1"/>
  <!-- Windows -->
  <rect x="28" y="40" width="28" height="18" rx="2" fill="#a0c8e0" stroke="#4a2a1a" stroke-width="1.5"/>
  <rect x="64" y="40" width="28" height="18" rx="2" fill="#a0c8e0" stroke="#4a2a1a" stroke-width="1.5"/>
  <!-- Door -->
  <rect x="88" y="56" width="24" height="32" rx="1" fill="#5a3a2a" stroke="#4a2a1a" stroke-width="1.5"/>
  <circle cx="97" cy="72" r="3" fill="#c8a878"/>
  <!-- Lamp -->
  <circle cx="122" cy="36" r="5" fill="#f0d060" stroke="#c0a040" stroke-width="1"/>
  <!-- Wheels -->
  <circle cx="38" cy="100" r="9" fill="#1a1a1a" stroke="#444" stroke-width="2"/>
  <circle cx="38" cy="100" r="4" fill="#444"/>
  <circle cx="104" cy="100" r="9" fill="#1a1a1a" stroke="#444" stroke-width="2"/>
  <circle cx="104" cy="100" r="4" fill="#444"/>
  <circle cx="132" cy="100" r="9" fill="#1a1a1a" stroke="#444" stroke-width="2"/>
  <circle cx="132" cy="100" r="4" fill="#444"/>
  <!-- Buffers -->
  <rect x="4" y="90" width="7" height="5" rx="1" fill="#666"/>
  <rect x="149" y="90" width="7" height="5" rx="1" fill="#666"/>
