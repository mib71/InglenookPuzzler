<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 120">
  <!-- Chassis -->
  <rect x="10" y="88" width="140" height="7" rx="1" fill="#2a2a2a"/>
  <!-- Deck -->
  <rect x="18" y="70" width="124" height="12" rx="1" fill="#7a6a4a" stroke="#5a4a2a" stroke-width="2"/>
  <!-- Deck planks -->
  <line x1="40" y1="70" x2="40" y2="82" stroke="#5a4a2a" stroke-width="1"/>
  <line x1="62" y1="70" x2="62" y2="82" stroke="#5a4a2a" stroke-width="1"/>
  <line x1="84" y1="70" x2="84" y2="82" stroke="#5a4a2a" stroke-width="1"/>
  <line x1="106" y1="70" x2="106" y2="82" stroke="#5a4a2a" stroke-width="1"/>
  <line x1="128" y1="70" x2="128" y2="82" stroke="#5a4a2a" stroke-width="1"/>
  <!-- End stanchions -->
  <rect x="18" y="52" width="5" height="20" fill="#5a4a2a"/>
  <rect x="137" y="52" width="5" height="20" fill="#5a4a2a"/>
  <!-- Side stanchions -->
  <rect x="54" y="60" width="4" height="12" fill="#5a4a2a"/>
  <rect x="102" y="60" width="4" height="12" fill="#5a4a2a"/>
  <!-- Wheels -->
  <circle cx="38" cy="100" r="9" fill="#1a1a1a" stroke="#444" stroke-width="2"/>
  <circle cx="38" cy="100" r="4" fill="#444"/>
  <circle cx="122" cy="100" r="9" fill="#1a1a1a" stroke="#444" stroke-width="2"/>
  <circle cx="122" cy="100" r="4" fill="#444"/>
  <!-- Buffers -->
  <rect x="4" y="90" width="7" height="5" rx="1" fill="#666"/>
  <rect x="149" y="90" width="7" height="5" rx="1" fill="#666"/>
</svg>
