<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 120">
  <!-- Chassis -->
  <rect x="10" y="88" width="140" height="7" rx="1" fill="#2a2a2a"/>
  <!-- Tank body -->
  <ellipse cx="80" cy="62" rx="60" ry="26" fill="#4a6a8a" stroke="#2a4a6a" stroke-width="2"/>
  <!-- Tank highlight -->
  <ellipse cx="80" cy="52" rx="52" ry="10" fill="#5a7a9a" opacity="0.4"/>
  <!-- End caps -->
  <ellipse cx="20" cy="62" rx="7" ry="26" fill="#3a5a7a" stroke="#2a4a6a" stroke-width="2"/>
  <ellipse cx="140" cy="62" rx="7" ry="26" fill="#3a5a7a" stroke="#2a4a6a" stroke-width="2"/>
  <!-- Filler cap -->
  <circle cx="80" cy="36" r="5" fill="#2a4a6a" stroke="#1a3a5a" stroke-width="1.5"/>
  <rect x="77" y="30" width="6" height="4" fill="#2a4a6a"/>
  <!-- Straps -->
  <line x1="52" y1="36" x2="52" y2="88" stroke="#2a4a6a" stroke-width="2"/>
  <line x1="108" y1="36" x2="108" y2="88" stroke="#2a4a6a" stroke-width="2"/>
  <!-- Wheels -->
  <circle cx="38" cy="100" r="9" fill="#1a1a1a" stroke="#444" stroke-width="2"/>
  <circle cx="38" cy="100" r="4" fill="#444"/>
  <circle cx="122" cy="100" r="9" fill="#1a1a1a" stroke="#444" stroke-width="2"/>
  <circle cx="122" cy="100" r="4" fill="#444"/>
  <!-- Buffers -->
  <rect x="4" y="90" width="7" height="5" rx="1" fill="#666"/>
  <rect x="149" y="90" width="7" height="5" rx="1" fill="#666"/>
</svg>
