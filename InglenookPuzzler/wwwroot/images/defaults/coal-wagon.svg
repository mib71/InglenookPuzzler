<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 120">
  <!-- Chassis -->
  <rect x="10" y="88" width="140" height="7" rx="1" fill="#2a2a2a"/>
  <!-- Body -->
  <rect x="18" y="45" width="124" height="43" rx="2" fill="#4a4a4a" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Coal load -->
  <ellipse cx="80" cy="45" rx="60" ry="11" fill="#2a2a2a"/>
  <ellipse cx="58" cy="41" rx="16" ry="7" fill="#3a3a3a"/>
  <ellipse cx="90" cy="38" rx="18" ry="8" fill="#333"/>
  <ellipse cx="75" cy="37" rx="13" ry="6" fill="#3a3a3a"/>
  <ellipse cx="112" cy="41" rx="14" ry="6" fill="#2a2a2a"/>
  <ellipse cx="44" cy="43" rx="12" ry="5" fill="#333"/>
  <!-- Body ribs -->
  <line x1="50" y1="45" x2="50" y2="88" stroke="#2a2a2a" stroke-width="1.5"/>
  <line x1="80" y1="45" x2="80" y2="88" stroke="#2a2a2a" stroke-width="1.5"/>
  <line x1="110" y1="45" x2="110" y2="88" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Wheels -->
  <circle cx="38" cy="100" r="9" fill="#1a1a1a" stroke="#444" stroke-width="2"/>
  <circle cx="38" cy="100" r="4" fill="#444"/>
  <circle cx="122" cy="100" r="9" fill="#1a1a1a" stroke="#444" stroke-width="2"/>
  <circle cx="122" cy="100" r="4" fill="#444"/>
  <!-- Buffers -->
  <rect x="4" y="90" width="7" height="5" rx="1" fill="#666"/>
  <rect x="149" y="90" width="7" height="5" rx="1" fill="#666"/>
</svg>
