<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 120">
  <!-- Chassis -->
  <rect x="10" y="88" width="140" height="7" rx="1" fill="#2a2a2a"/>
  <!-- Hopper shape -->
  <polygon points="18,40 142,40 122,83 38,83" fill="#6a6a5a" stroke="#4a4a3a" stroke-width="2"/>
  <!-- Bottom chutes -->
  <polygon points="38,83 60,83 56,93 42,93" fill="#4a4a3a" stroke="#3a3a2a" stroke-width="1.5"/>
  <polygon points="100,83 122,83 118,93 104,93" fill="#4a4a3a" stroke="#3a3a2a" stroke-width="1.5"/>
  <!-- Top rim -->
  <rect x="16" y="37" width="128" height="6" rx="1" fill="#5a5a4a" stroke="#4a4a3a" stroke-width="1.5"/>
  <!-- Internal ribs -->
  <line x1="50" y1="43" x2="42" y2="83" stroke="#4a4a3a" stroke-width="1.5"/>
  <line x1="80" y1="43" x2="80" y2="83" stroke="#4a4a3a" stroke-width="1.5"/>
  <line x1="110" y1="43" x2="118" y2="83" stroke="#4a4a3a" stroke-width="1.5"/>
  <!-- Wheels -->
  <circle cx="38" cy="100" r="9" fill="#1a1a1a" stroke="#444" stroke-width="2"/>
  <circle cx="38" cy="100" r="4" fill="#444"/>
  <circle cx="122" cy="100" r="9" fill="#1a1a1a" stroke="#444" stroke-width="2"/>
  <circle cx="122" cy="100" r="4" fill="#444"/>
  <!-- Buffers -->
  <rect x="4" y="90" width="7" height="5" rx="1" fill="#666"/>
  <rect x="149" y="90" width="7" height="5" rx="1" fill="#666"/>
</svg>
