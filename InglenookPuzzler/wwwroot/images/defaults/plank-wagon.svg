<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 120">
  <!-- Chassis -->
  <rect x="10" y="88" width="140" height="7" rx="1" fill="#2a2a2a"/>
  <!-- Body -->
  <rect x="18" y="42" width="124" height="46" rx="2" fill="#3a2a1a" stroke="#2a1a0a" stroke-width="2"/>
  <!-- Horizontal planks -->
  <rect x="19" y="43" width="122" height="7" fill="#6a4a2a"/>
  <rect x="19" y="51" width="122" height="7" fill="#7a5a3a"/>
  <rect x="19" y="59" width="122" height="7" fill="#6a4a2a"/>
  <rect x="19" y="67" width="122" height="7" fill="#7a5a3a"/>
  <rect x="19" y="75" width="122" height="7" fill="#6a4a2a"/>
  <!-- Plank gaps -->
  <line x1="19" y1="50" x2="141" y2="50" stroke="#2a1a0a" stroke-width="1.5"/>
  <line x1="19" y1="58" x2="141" y2="58" stroke="#2a1a0a" stroke-width="1.5"/>
  <line x1="19" y1="66" x2="141" y2="66" stroke="#2a1a0a" stroke-width="1.5"/>
  <line x1="19" y1="74" x2="141" y2="74" stroke="#2a1a0a" stroke-width="1.5"/>
  <!-- End boards -->
  <rect x="18" y="42" width="5" height="46" fill="#4a2a1a" stroke="#2a1a0a" stroke-width="1"/>
  <rect x="137" y="42" width="5" height="46" fill="#4a2a1a" stroke="#2a1a0a" stroke-width="1"/>
  <!-- Floor -->
  <rect x="18" y="83" width="124" height="5" fill="#2a1a0a"/>
  <!-- Wheels -->
  <circle cx="38" cy="100" r="9" fill="#1a1a1a" stroke="#444" stroke-width="2"/>
  <circle cx="38" cy="100" r="4" fill="#444"/>
  <circle cx="122" cy="100" r="9" fill="#1a1a1a" stroke="#444" stroke-width="2"/>
  <circle cx="122" cy="100" r="4" fill="#444"/>
  <!-- Buffers -->
  <rect x="4" y="90" width="7" height="5" rx="1" fill="#666"/>
  <rect x="149" y="90" width="7" height="5" rx="1" fill="#666"/>
</svg>
